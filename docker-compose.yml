networks:
  network-ujikom:
    name: network-ujikom
    driver: bridge

volumes:
  volume-ujikom:
    name: volume-ujikom

services:
  # ------------------------------------------------------------------
  # DATABASE - MySQL, port 3306:3306, volume "volume-ujikom"
  # ------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: ekspedisi-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ekspedisi_root_secret
      MYSQL_DATABASE: ekspedisi_online
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
    ports:
      - "3306:3306"
    volumes:
      - volume-ujikom:/var/lib/mysql
    networks:
      - network-ujikom
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pekspedisi_root_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # MIGRATE - one-off job: prisma db push + prisma db seed, lalu exit.
  # Dipisah dari web1/2/3 supaya db push & seed cuma jalan SEKALI,
  # gak race condition kalau 3 container web jalan bareng-bareng.
  # ------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-migrate
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - network-ujikom
    restart: "no"

  # ------------------------------------------------------------------
  # WEB x3 - custom image (scaling), HANYA expose (gak ada ports:)
  # supaya gak bisa diakses langsung dari host, cuma lewat loadbalancer.
  # ------------------------------------------------------------------
  web1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-web1
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "false"
      INSTANCE_NAME: web1
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    networks:
      - network-ujikom

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-web2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "false"
      INSTANCE_NAME: web2
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    networks:
      - network-ujikom

  web3:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-web3
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "false"
      INSTANCE_NAME: web3
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    networks:
      - network-ujikom

  # ------------------------------------------------------------------
  # LOADBALANCER - nginx, WAJIB 8080:80 (soal), + 8443:443 (SSL bonus)
  # ------------------------------------------------------------------
  loadbalancer:
    image: nginx:stable-alpine
    container_name: ekspedisi-lb
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - network-ujikom