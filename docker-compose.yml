networks:
  ujikom-net:
    name: ujikom-net
    driver: bridge

volumes:
  app-volume:
    name: app-volume
  db-volume:
    name: db-volume

services:
  # ------------------------------------------------------------------
  # DATABASE - MySQL, port 3306:3306, volume "db-volume"
  # ------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: ekspedisi-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ekspedisi_root_secret
      MYSQL_DATABASE: ekspedisi_online
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
    ports:
      - "3306:3306"
    volumes:
      - db-volume:/var/lib/mysql
    networks:
      - ujikom-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pekspedisi_root_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # MIGRATE - one-off job: prisma db push + prisma db seed, lalu exit.
  # Dipisah dari app1/app2 supaya db push & seed cuma jalan SEKALI.
  # ------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-migrate
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ujikom-net
    restart: "no"

  # ------------------------------------------------------------------
  # APP x2 (scaling) - custom image, HANYA expose (gak ada ports:)
  # Pakai volume "app-volume" bersama buat public/uploads (shared antar
  # container, biar file yang diupload lewat app1 tetep kebaca di app2)
  # ------------------------------------------------------------------
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-app1
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "false"
      INSTANCE_NAME: app1
    volumes:
      - app-volume:/app/public/uploads
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    networks:
      - ujikom-net

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekspedisi-app:latest
    container_name: ekspedisi-app2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      RUN_MIGRATIONS: "false"
      INSTANCE_NAME: app2
    volumes:
      - app-volume:/app/public/uploads
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    networks:
      - ujikom-net

  # ------------------------------------------------------------------
  # LOADBALANCER - nginx, WAJIB 8080:80 (soal). SSL 8443 opsional/bonus.
  # ------------------------------------------------------------------
  loadbalancer:
    image: nginx:stable-alpine
    container_name: ekspedisi-lb
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app1
      - app2
    networks:
      - ujikom-net