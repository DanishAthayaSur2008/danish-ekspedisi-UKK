worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- Upstream: 2 container app (load balancing round-robin) ----------
    # Menggunakan IP upstream untuk dipetakan ke nama yang mudah dibaca penguji
    upstream ekspedisi_backend {
        server app1:3000;
        server app2:3000;
    }

    # Peta pembeda untuk menerjemahkan IP internal Docker menjadi nama kontainer yang jelas
    map $upstream_addr $custom_server_name {
        default               "Memuat Aplikasi...";
        ~^.*app1.*            "SERVER KONTENER: APP-1 (Utama)";
        ~^.*app2.*            "SERVER KONTENER: APP-2 (Backup)";
        # Fallback cadangan jika Nginx hanya membaca IP mentah Docker (sesuaikan jika IP berbeda)
        ~^172\..*\.3:3000$    "SERVER KONTENER: APP-1 (Utama)";
        ~^172\..*\.4:3000$    "SERVER KONTENER: APP-2 (Backup)";
    }

    # ---------- HTTP - WAJIB sesuai soal: diakses user via 8080:80 ----------
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://ekspedisi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Matiin gzip dari backend, WAJIB biar sub_filter di bawah bisa jalan
            # (sub_filter gak bisa modif response yang udah dikompres)
            proxy_set_header Accept-Encoding "";

            # Bukti load balancing lewat header (terlihat jelas saat di-curl -I)
            add_header X-Upstream-Server-Name $custom_server_name always;
            add_header X-Upstream-Server-IP $upstream_addr always;

            # Bukti load balancing VISUAL: Menggunakan nama kustom + IP asli agar pembuktian valid
            sub_filter '</body>' '<div style="position:fixed;bottom:12px;right:12px;background:#1a1a1a;color:#00ff00;padding:12px 20px;border-radius:8px;font-family:monospace;font-size:14px;z-index:999999;box-shadow:0 4px 15px rgba(0,0,0,.5);border:1px solid #00ff00;">🟢 $custom_server_name <br><span style="color:#aaa;font-size:11px;">IP: $upstream_addr</span></div></body>';
            sub_filter_once on;
        }
    }

    # ---------- HTTPS - opsional/bonus (port 8443) ----------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/ekspedisi.crt;
        ssl_certificate_key /etc/nginx/ssl/ekspedisi.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://ekspedisi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";

            add_header X-Upstream-Server-Name $custom_server_name always;
            add_header X-Upstream-Server-IP $upstream_addr always;

            sub_filter '</body>' '<div style="position:fixed;bottom:12px;right:12px;background:#1a1a1a;color:#00ff00;padding:12px 20px;border-radius:8px;font-family:monospace;font-size:14px;z-index:999999;box-shadow:0 4px 15px rgba(0,0,0,.5);border:1px solid #00ff00;">🔒 HTTPS - $custom_server_name <br><span style="color:#aaa;font-size:11px;">IP: $upstream_addr</span></div></body>';
            sub_filter_once on;
        }
    }
}
