worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ---------- Upstream: 2 container app (load balancing round-robin) ----------
    upstream ekspedisi_backend {
        server app1:3000;
        server app2:3000;
    }

    # ---------- HTTP - WAJIB sesuai soal: diakses user via 8080:80 ----------
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://ekspedisi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Bukti load balancing: header ini beda2 tergantung container mana yang handle request
            add_header X-Upstream-Server $upstream_addr always;
        }
    }

    # ---------- HTTPS - opsional/bonus (port 8443) ----------
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/ekspedisi.crt;
        ssl_certificate_key /etc/nginx/ssl/ekspedisi.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://ekspedisi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            add_header X-Upstream-Server $upstream_addr always;
        }
    }
}